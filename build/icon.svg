<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="sky" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#3a1420"/>
      <stop offset="45%" stop-color="#1a0a12"/>
      <stop offset="100%" stop-color="#070409"/>
    </radialGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b3d"/>
      <stop offset="55%" stop-color="#d63a2a"/>
      <stop offset="100%" stop-color="#6e1414"/>
    </radialGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2f3a"/>
      <stop offset="100%" stop-color="#0e1016"/>
    </linearGradient>
    <radialGradient id="flame" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff3b0"/>
      <stop offset="45%" stop-color="#ff9d2e"/>
      <stop offset="100%" stop-color="#ff9d2e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded background -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#sky)"/>

  <!-- blood moon -->
  <circle cx="256" cy="176" r="92" fill="url(#moon)"/>
  <circle cx="256" cy="176" r="92" fill="none" stroke="#ff8a5c" stroke-opacity="0.25" stroke-width="3"/>

  <!-- castle silhouette -->
  <g fill="url(#stone)" stroke="#05060a" stroke-width="3" stroke-linejoin="round">
    <!-- left tower -->
    <path d="M96 300 h64 v-40 h16 v40 h16 v172 H80 V260 h16 z"/>
    <!-- right tower -->
    <path d="M320 300 h64 v-40 h16 v40 h16 v172 h-128 V260 h16 z"/>
    <!-- central keep (taller) -->
    <path d="M196 236 h24 v-34 h16 v34 h40 v-34 h16 v34 h24 v236 H196 z"/>
  </g>

  <!-- gate -->
  <path d="M232 472 v-70 a24 24 0 0 1 48 0 v70 z" fill="#08060b" stroke="#05060a" stroke-width="3"/>

  <!-- lit windows -->
  <g fill="#ffb347">
    <rect x="120" y="330" width="16" height="26" rx="3"/>
    <rect x="360" y="330" width="16" height="26" rx="3"/>
    <rect x="228" y="286" width="18" height="30" rx="4"/>
    <rect x="266" y="286" width="18" height="30" rx="4"/>
  </g>

  <!-- torch flames glow on the towers -->
  <circle cx="128" cy="252" r="30" fill="url(#flame)"/>
  <circle cx="384" cy="252" r="30" fill="url(#flame)"/>
  <path d="M124 258 q4 -20 4 -26 q6 10 6 16 q4 -6 4 -12 q6 12 2 22 q-8 8 -16 0 z" fill="#ffd24a"/>
  <path d="M380 258 q4 -20 4 -26 q6 10 6 16 q4 -6 4 -12 q6 12 2 22 q-8 8 -16 0 z" fill="#ffd24a"/>
</svg>
