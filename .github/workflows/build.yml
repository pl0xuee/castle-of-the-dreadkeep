name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            build: npm run dist:linux
            # Installer + the electron-updater feed metadata (blockmap is optional).
            artifact: |
              release/*.AppImage
              release/latest-linux.yml
              release/*.blockmap
          - os: windows-latest
            name: windows
            build: npm run dist:win
            artifact: |
              release/*.exe
              release/latest.yml
              release/*.blockmap
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Electron 43 requires Node >= 22.12 to build, and Node 20 went
          # end-of-life 2026-04-30 -- the runner had been warning about it.
          node-version: 22

      # Not `npm ci`: the committed lockfile may have been produced by a
      # non-standard npm, and `npm install` resolves cleanly on any runner.
      # Electron's postinstall downloads its prebuilt binary here.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build ${{ matrix.name }}
        run: ${{ matrix.build }}

      - name: Upload ${{ matrix.name }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreadkeep-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # On a version tag (e.g. v1.1.2) publish a GitHub Release with both installers
  # plus the electron-updater feed metadata (latest*.yml + blockmaps) so the
  # in-app auto-updater can find and verify new builds.
  release:
    name: Publish release
    needs: build
    # `success()` is required explicitly. A job-level `if:` REPLACES the implicit
    # success() gate that `needs:` would otherwise apply, so without it a failed
    # Windows (or Linux) leg still reached this job -- and because the globs below
    # run under `nullglob`, that platform's files silently vanished from the array
    # instead of failing, publishing a half-complete release.
    if: success() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(
            dist/dreadkeep-linux/*.AppImage
            dist/dreadkeep-linux/*.yml
            dist/dreadkeep-linux/*.blockmap
            dist/dreadkeep-windows/*.exe
            dist/dreadkeep-windows/*.yml
            dist/dreadkeep-windows/*.blockmap
          )
          echo "Publishing ${#files[@]} files:"; printf '  %s\n' "${files[@]}"
          # Belt and braces behind the success() gate: assert both installers and
          # both updater manifests are actually present, so a release can never go
          # out missing a platform even if a build leg "succeeds" without emitting.
          missing=0
          for required in \
            'dist/dreadkeep-linux/*.AppImage' \
            'dist/dreadkeep-linux/latest-linux.yml' \
            'dist/dreadkeep-windows/*.exe' \
            'dist/dreadkeep-windows/latest.yml'
          do
            # The -e test is load-bearing: nullglob only blanks patterns that
            # actually contain wildcards, so a literal path like latest.yml
            # survives expansion even when the file is absent.
            found=( $required )
            if [ ${#found[@]} -eq 0 ] || [ ! -e "${found[0]}" ]; then
              echo "MISSING: $required"; missing=1
            fi
          done
          if [ $missing -ne 0 ]; then
            echo "Refusing to publish an incomplete release."; exit 1
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "${files[@]}"
