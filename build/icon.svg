<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="sky" cx="50%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#4a1622"/>
      <stop offset="42%" stop-color="#1c0a12"/>
      <stop offset="100%" stop-color="#050306"/>
    </radialGradient>
    <radialGradient id="moon" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#ffd0a0"/>
      <stop offset="10%" stop-color="#ff8a4a"/>
      <stop offset="52%" stop-color="#d8321f"/>
      <stop offset="100%" stop-color="#5c0f0f"/>
    </radialGradient>
    <radialGradient id="moonHaze" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5a2a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff5a2a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20232c"/>
      <stop offset="100%" stop-color="#080a10"/>
    </linearGradient>
    <linearGradient id="stoneLit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2029"/>
      <stop offset="100%" stop-color="#0a0710"/>
    </linearGradient>
    <radialGradient id="gate" cx="50%" cy="88%" r="75%">
      <stop offset="0%" stop-color="#ffd66a"/>
      <stop offset="35%" stop-color="#ff8f2e"/>
      <stop offset="80%" stop-color="#7a2a0e"/>
      <stop offset="100%" stop-color="#160a08"/>
    </radialGradient>
    <radialGradient id="flame" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff6c8"/>
      <stop offset="40%" stop-color="#ffb43e"/>
      <stop offset="100%" stop-color="#ffb43e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="window" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ffd27a"/>
      <stop offset="100%" stop-color="#d2701f"/>
    </radialGradient>
  </defs>

  <!-- rounded app-icon plate -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#sky)"/>

  <!-- blood moon with haze -->
  <circle cx="256" cy="188" r="150" fill="url(#moonHaze)"/>
  <circle cx="256" cy="182" r="96" fill="url(#moon)"/>
  <circle cx="256" cy="182" r="96" fill="none" stroke="#ff9a5c" stroke-opacity="0.2" stroke-width="3"/>

  <!-- distant flanking towers (behind) -->
  <g fill="url(#stone)" stroke="#04050a" stroke-width="3" stroke-linejoin="round">
    <path d="M64 300 h60 v-30 h14 v30 h14 v172 H50 V276 h14 z"/>
    <path d="M360 300 h60 v-30 h14 v30 h14 v172 h-116 V276 h14 z"/>
  </g>

  <!-- central keep -->
  <g stroke="#04050a" stroke-width="3" stroke-linejoin="round">
    <!-- battlement + body -->
    <path fill="url(#stoneLit)" d="M168 250
      h20 v-30 h18 v30 h20 v-30 h20 v30 h20 v-30 h18 v30 h20 v222 H168 z"/>
  </g>

  <!-- glowing gate — 'enter the Dreadkeep' -->
  <path d="M214 472 v-92 a42 42 0 0 1 84 0 v92 z" fill="url(#gate)"/>
  <path d="M214 472 v-92 a42 42 0 0 1 84 0 v92 z" fill="none" stroke="#1a0d0a" stroke-width="4"/>
  <!-- portcullis bars -->
  <g stroke="#1c0f08" stroke-width="4" stroke-opacity="0.65">
    <line x1="236" y1="352" x2="236" y2="472"/>
    <line x1="256" y1="344" x2="256" y2="472"/>
    <line x1="276" y1="352" x2="276" y2="472"/>
  </g>

  <!-- lit keep windows -->
  <g fill="url(#window)">
    <rect x="224" y="292" width="20" height="34" rx="6"/>
    <rect x="268" y="292" width="20" height="34" rx="6"/>
  </g>

  <!-- tower torches: bloom glow + flame -->
  <circle cx="94" cy="256" r="34" fill="url(#flame)"/>
  <circle cx="418" cy="256" r="34" fill="url(#flame)"/>
  <path d="M89 262 q5 -22 5 -30 q7 11 7 18 q5 -7 5 -14 q7 14 2 26 q-9 9 -18 0 z" fill="#ffdd55"/>
  <path d="M413 262 q5 -22 5 -30 q7 11 7 18 q5 -7 5 -14 q7 14 2 26 q-9 9 -18 0 z" fill="#ffdd55"/>

  <!-- subtle inner vignette -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="none" stroke="#000000" stroke-opacity="0.5" stroke-width="10"/>
</svg>
