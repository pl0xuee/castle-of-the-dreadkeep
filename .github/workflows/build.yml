name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            build: npm run dist:linux
            # Installer + the electron-updater feed metadata (blockmap is optional).
            artifact: |
              release/*.AppImage
              release/latest-linux.yml
              release/*.blockmap
          - os: windows-latest
            name: windows
            build: npm run dist:win
            artifact: |
              release/*.exe
              release/latest.yml
              release/*.blockmap
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Not `npm ci`: the committed lockfile may have been produced by a
      # non-standard npm, and `npm install` resolves cleanly on any runner.
      # Electron's postinstall downloads its prebuilt binary here.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build ${{ matrix.name }}
        run: ${{ matrix.build }}

      - name: Upload ${{ matrix.name }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreadkeep-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # On a version tag (e.g. v1.1.2) publish a GitHub Release with both installers
  # plus the electron-updater feed metadata (latest*.yml + blockmaps) so the
  # in-app auto-updater can find and verify new builds.
  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(
            dist/dreadkeep-linux/*.AppImage
            dist/dreadkeep-linux/*.yml
            dist/dreadkeep-linux/*.blockmap
            dist/dreadkeep-windows/*.exe
            dist/dreadkeep-windows/*.yml
            dist/dreadkeep-windows/*.blockmap
          )
          echo "Publishing ${#files[@]} files:"; printf '  %s\n' "${files[@]}"
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "${files[@]}"
